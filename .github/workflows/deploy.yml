name: CD — Terraform Apply + Deploy to EC2

on:
  push:
    branches: [main]

env:
  AWS_REGION: ap-southeast-2
  TF_VERSION: 1.7.0

jobs:
  terraform:
    name: Terraform Apply
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    outputs:
      public_ip: ${{ steps.tf_output.outputs.public_ip }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      - name: Get EC2 Public IP
        id: tf_output
        run: echo "public_ip=$(terraform output -raw public_ip)" >> $GITHUB_OUTPUT

  deploy:
    name: Deploy App to EC2
    runs-on: ubuntu-latest
    needs: terraform

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ needs.terraform.outputs.public_ip || secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            APP_DIR=/home/ubuntu/yoga-booking

            # Ensure repo exists, else clone
            if [ ! -d "$APP_DIR" ]; then
              git clone https://github.com/QUT-Rizwan/ypga-booking.git $APP_DIR
            fi

            cd $APP_DIR
            git pull origin main

            # Set backend environment variables
            cat > backend/.env <<ENVFILE
            PORT=5001
            MONGO_URI=${{ secrets.MONGO_URI }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            NODE_ENV=production
            ENVFILE

            # Backend: install & restart
            cd backend
            npm ci --omit=dev
            pm2 restart yoga-backend || pm2 start server.js --name yoga-backend
            cd ..

            # Frontend: install, build & serve
            cd frontend
            npm ci
            REACT_APP_API_URL=http://${{ needs.terraform.outputs.public_ip || secrets.EC2_HOST }}/api \
              npm run build
            pm2 restart yoga-frontend || pm2 serve build 3000 --name yoga-frontend --spa
            cd ..

            pm2 save
            echo "Deployment complete"
